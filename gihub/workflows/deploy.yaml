name: deploy
on: [push]
jobs: 
  lint: 
    runs-on: ubuntu-latest
    steps: 
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Linting code
        run: echo "Linting code..."
  test: 
    runs-on: ubuntu-latest
    needs: lint
    steps: 
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: test code
        run: npm run test
      - name: Test code
        run: echo "testing..."
  deploy: 
    runs-on: ubuntu-latest
    needs: test
    steps: 
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deploying..."
  